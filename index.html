<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>甲子園風ランダム対戦表</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #ffffff;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      color: #111;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
    }

    .controls {
      margin-bottom: 16px;
      text-align: center;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      border: 1px solid #333;
      background: #fff;
      cursor: pointer;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    select {
      padding: 8px 10px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #ffffff;
    }

    td {
      border: 1px solid #ffffff;
      text-align: center;
      vertical-align: middle;
      padding: 0;
      background: #ffffff;
    }

    .title-cell {
      background: #0b3d2e;
      color: #fff;
      font-family: Impact, "Arial Black", sans-serif;
      font-weight: bold;
      font-size: 28px;
      letter-spacing: 1px;
      height: 56px;
    }

    .time-top,
    .time-bottom {
      height: 30px;
      font-size: 22px;
      font-weight: bold;
      background: #ffffff;
      color: #c40000;
    }

    .time-label {
      height: 18px;
      font-size: 11px;
      font-weight: bold;
      background: #ffffff;
      color: #c40000;
    }

    .blank {
      background: #ffffff;
    }

    .day-cell {
      width: 86px;
      background: #ffffff;
    }

    .side-cell {
      width: 72px;
      background: #ffffff;
    }

    .stacked-vertical {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
      box-sizing: border-box;
    }

    .stacked-vertical span {
      display: block;
      text-align: center;
      line-height: 1;
    }

    .day-text {
      color: #c40000;
      font-size: 28px;
      font-weight: bold;
      gap: 10px;
    }

    .side-label {
      color: #0077cc;
      font-size: 26px;
      font-weight: bold;
      gap: 12px;
    }

    .school-row td {
      height: 190px;
    }

    .school-cell {
      background: #ffffff;
    }

    .school-name {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      font-weight: bold;
      font-size: 34px;
      line-height: 1;
      padding: 14px 0;
      background: #ffffff;
    }

    .school-name span {
      display: block;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      transform: scaleY(1.02);
    }

    .chars-2 {
      justify-content: space-between;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .chars-3 {
      justify-content: space-between;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .chars-4 {
      justify-content: space-around;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .chars-5 {
      justify-content: space-between;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .chars-6plus {
      justify-content: space-evenly;
      font-size: 28px;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .versus-cell {
      height: 42px;
      font-size: 28px;
      font-weight: bold;
      background: #ffffff;
      color: #c40000;
    }

    .error {
      margin-top: 12px;
      text-align: center;
      color: #c40000;
      font-weight: bold;
      min-height: 1.5em;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .title-cell {
        font-size: 20px;
        height: 48px;
      }

      .time-top,
      .time-bottom {
        font-size: 16px;
        height: 22px;
      }

      .time-label {
        font-size: 10px;
        height: 12px;
      }

      .school-row td {
        height: 126px;
      }

      .school-name {
        font-size: 22px;
        padding: 8px 0;
      }

      .chars-6plus {
        font-size: 18px;
      }

      .versus-cell {
        font-size: 18px;
        height: 34px;
      }

      .day-text {
        font-size: 20px;
        gap: 8px;
      }

      .side-label {
        font-size: 18px;
        gap: 8px;
      }

      .controls-row {
        gap: 8px;
      }

      .day-cell {
        width: 60px;
      }

      .side-cell {
        width: 52px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <div class="controls-row">
        <label for="yearStart">開始年</label>
        <select id="yearStart"></select>

        <label for="yearEnd">終了年</label>
        <select id="yearEnd"></select>

        <button id="shuffleBtn">対戦ボード生成</button>
      </div>
      <div class="error" id="errorText"></div>
    </div>

    <table>
      <tbody>
        <tr>
          <td class="title-cell" colspan="8">HANSHIN KOSHIEN STADIUM</td>
        </tr>

        <tr>
          <td class="blank"></td>
          <td class="time-top" id="time1-hour">08</td>
          <td class="time-top" id="time2-hour">10</td>
          <td class="time-top" id="time3-hour">13</td>
          <td class="time-top" id="time4-hour">15</td>
          <td class="blank"></td>
          <td class="day-cell" rowspan="7">
            <div class="stacked-vertical day-text" id="dayText"></div>
          </td>
          <td class="blank"></td>
        </tr>

        <tr>
          <td class="blank"></td>
          <td class="time-label">時</td>
          <td class="time-label">時</td>
          <td class="time-label">時</td>
          <td class="time-label">時</td>
          <td class="blank"></td>
          <td class="blank"></td>
        </tr>

        <tr>
          <td class="blank"></td>
          <td class="time-bottom" id="time1-minute">00</td>
          <td class="time-bottom" id="time2-minute">30</td>
          <td class="time-bottom" id="time3-minute">00</td>
          <td class="time-bottom" id="time4-minute">30</td>
          <td class="blank"></td>
          <td class="blank"></td>
        </tr>

        <tr>
          <td class="blank"></td>
          <td class="time-label">分</td>
          <td class="time-label">分</td>
          <td class="time-label">分</td>
          <td class="time-label">分</td>
          <td class="blank"></td>
          <td class="blank"></td>
        </tr>

        <tr class="school-row">
          <td class="blank"></td>
          <td class="school-cell"><div class="school-name" id="team1-top"></div></td>
          <td class="school-cell"><div class="school-name" id="team2-top"></div></td>
          <td class="school-cell"><div class="school-name" id="team3-top"></div></td>
          <td class="school-cell"><div class="school-name" id="team4-top"></div></td>
          <td class="side-cell">
            <div class="stacked-vertical side-label" id="firstBaseLabel"></div>
          </td>
          <td class="blank"></td>
        </tr>

        <tr>
          <td class="blank"></td>
          <td class="versus-cell">┃</td>
          <td class="versus-cell">┃</td>
          <td class="versus-cell">┃</td>
          <td class="versus-cell">┃</td>
          <td class="blank"></td>
          <td class="blank"></td>
        </tr>

        <tr class="school-row">
          <td class="blank"></td>
          <td class="school-cell"><div class="school-name" id="team1-bottom"></div></td>
          <td class="school-cell"><div class="school-name" id="team2-bottom"></div></td>
          <td class="school-cell"><div class="school-name" id="team3-bottom"></div></td>
          <td class="school-cell"><div class="school-name" id="team4-bottom"></div></td>
          <td class="side-cell">
            <div class="stacked-vertical side-label" id="thirdBaseLabel"></div>
          </td>
          <td class="blank"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const gameTimes = [
      { hour: "15", minute: "30" },
      { hour: "13", minute: "00" },
      { hour: "10", minute: "30" },
      { hour: "8", minute: "00" }
    ];

    const dayLabel = "第X日";
    let schoolData = [];

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const header = lines.shift().split(",");

      return lines.map(line => {
        const cols = line.split(",");
        const row = {};
        header.forEach((key, i) => {
          row[key.trim()] = (cols[i] || "").trim();
        });
        row.year = Number(row.year);
        return row;
      });
    }

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function splitSchoolName(name) {
      return [...name];
    }

    function getClassByLength(length) {
      if (length <= 2) return "chars-2";
      if (length === 3) return "chars-3";
      if (length === 4) return "chars-4";
      if (length === 5) return "chars-5";
      return "chars-6plus";
    }

    function renderVerticalName(elementId, schoolName) {
      const container = document.getElementById(elementId);
      container.innerHTML = "";

      const chars = splitSchoolName(schoolName);
      container.className = "school-name " + getClassByLength(chars.length);

      chars.forEach(char => {
        const span = document.createElement("span");
        span.textContent = char;
        container.appendChild(span);
      });
    }

    function renderStackedText(elementId, text) {
      const container = document.getElementById(elementId);
      container.innerHTML = "";

      [...text].forEach(char => {
        const span = document.createElement("span");
        span.textContent = char;
        container.appendChild(span);
      });
    }

    function renderTimes(times) {
      document.getElementById("time1-hour").textContent = times[0].hour;
      document.getElementById("time1-minute").textContent = times[0].minute;
      document.getElementById("time2-hour").textContent = times[1].hour;
      document.getElementById("time2-minute").textContent = times[1].minute;
      document.getElementById("time3-hour").textContent = times[2].hour;
      document.getElementById("time3-minute").textContent = times[2].minute;
      document.getElementById("time4-hour").textContent = times[3].hour;
      document.getElementById("time4-minute").textContent = times[3].minute;
    }

    function fillYearSelects(data) {
      const years = [...new Set(data.map(row => row.year))].sort((a, b) => a - b);
      const startSelect = document.getElementById("yearStart");
      const endSelect = document.getElementById("yearEnd");

      startSelect.innerHTML = "";
      endSelect.innerHTML = "";

      years.forEach(year => {
        const option1 = document.createElement("option");
        option1.value = year;
        option1.textContent = year;
        startSelect.appendChild(option1);

        const option2 = document.createElement("option");
        option2.value = year;
        option2.textContent = year;
        endSelect.appendChild(option2);
      });

      startSelect.value = 2015;
      endSelect.value = 2025;
    }

    function getFilteredData() {
      const startYear = Number(document.getElementById("yearStart").value);
      const endYear = Number(document.getElementById("yearEnd").value);

      if (startYear > endYear) {
        throw new Error("開始年は終了年以下にしてください。");
      }

      return schoolData.filter(row => row.year >= startYear && row.year <= endYear);
    }

    function pickSchoolsWithoutDuplicatePrefecture(filteredData, count = 8) {
      const grouped = {};

      filteredData.forEach(row => {
        if (!grouped[row.prefecture]) {
          grouped[row.prefecture] = [];
        }
        grouped[row.prefecture].push(row);
      });

      const prefectures = Object.keys(grouped);

      if (prefectures.length < count) {
        throw new Error("抽選可能な都道府県数が不足しています。年の範囲を広げてください。");
      }

      const selectedPrefectures = shuffleArray(prefectures).slice(0, count);

      return selectedPrefectures.map(prefecture => {
        const candidates = grouped[prefecture];
        return candidates[Math.floor(Math.random() * candidates.length)];
      });
    }

    function renderBracket() {
      const errorText = document.getElementById("errorText");
      errorText.textContent = "";

      try {
        const filteredData = getFilteredData();
        const selected = pickSchoolsWithoutDuplicatePrefecture(filteredData, 8);

        renderVerticalName("team1-top", selected[0].school);
        renderVerticalName("team1-bottom", selected[1].school);

        renderVerticalName("team2-top", selected[2].school);
        renderVerticalName("team2-bottom", selected[3].school);

        renderVerticalName("team3-top", selected[4].school);
        renderVerticalName("team3-bottom", selected[5].school);

        renderVerticalName("team4-top", selected[6].school);
        renderVerticalName("team4-bottom", selected[7].school);

        renderTimes(gameTimes);
        renderStackedText("dayText", dayLabel);
        renderStackedText("firstBaseLabel", "１塁側");
        renderStackedText("thirdBaseLabel", "３塁側");
      } catch (error) {
        errorText.textContent = error.message;
      }
    }

    async function init() {
      try {
        const response = await fetch("./schools.csv");
        if (!response.ok) {
          throw new Error("schools.csv の読み込みに失敗しました。");
        }

        const csvText = await response.text();
        schoolData = parseCSV(csvText);

        fillYearSelects(schoolData);
        renderBracket();

        document.getElementById("shuffleBtn").addEventListener("click", renderBracket);
        document.getElementById("yearStart").addEventListener("change", renderBracket);
        document.getElementById("yearEnd").addEventListener("change", renderBracket);
      } catch (error) {
        document.getElementById("errorText").textContent = error.message;
      }
    }

    init();
  </script>
</body>
</html>
